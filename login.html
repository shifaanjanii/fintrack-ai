<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FinTrack AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #F3F4F8; 
            position: relative; 
        }
        
        .input-underline {
            width: 100%;
            border: none;
            border-bottom: 2px solid #E5E7EB;
            background-color: transparent;
            padding: 10px 0;
            font-size: 0.95rem;
            color: #374151;
            outline: none;
            transition: border-color 0.3s ease;
        }
        .input-underline:focus {
            border-bottom-color: #c4a4f9;
        }
        .input-underline::placeholder {
            color: #9CA3AF;
        }

        .custom-checkbox {
            accent-color: #3b82f6; 
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        @keyframes float-bubble {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }

        .color-bubble {
            will-change: transform;
            transform: translateZ(0); 
            position: fixed;
            border-radius: 50%;
            z-index: -1;
            pointer-events: none;
            animation: float-bubble 15s infinite ease-in-out;
        }

        .bubble-1 {
            width: 600px; 
            height: 600px;
            background: radial-gradient(circle, rgba(132, 119, 228, 0.4) 0%, rgba(132, 119, 228, 0) 70%);
            top: -10%; 
            left: -10%;
            filter: blur(40px);
        }

        .bubble-2 {
            width: 500px; 
            height: 500px;
            background: radial-gradient(circle, rgba(229, 132, 238, 0.45) 0%, rgba(229, 132, 238, 0) 70%);
            top: 25%; 
            right: -10%;
            animation-delay: -5s; 
            filter: blur(50px);
        }

        .bubble-3 {
            width: 700px; 
            height: 700px;
            background: radial-gradient(circle, rgba(161, 140, 209, 0.35) 0%, rgba(161, 140, 209, 0) 70%);
            bottom: 10%; 
            left: -15%;
            animation-delay: -10s;
            filter: blur(60px);
        }

        .bubble-4 {
            width: 400px; 
            height: 400px;
            background: radial-gradient(circle, rgba(206, 102, 219, 0.3) 0%, rgba(206, 102, 219, 0) 70%);
            bottom: 25%; 
            right: 5%;
            animation-delay: -7s;
            filter: blur(45px);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4 md:p-8">

    <div class="fixed inset-0 overflow-hidden pointer-events-none -z-10">
    <div class="color-bubble bubble-1"></div>
    <div class="color-bubble bubble-2"></div>
    <div class="color-bubble bubble-3"></div>
    <div class="color-bubble bubble-4"></div>
    </div>

    
    <div class="fixed inset-0 overflow-hidden pointer-events-none -z-10 flex items-center justify-center">
    
    <img src="gambar/bubble.png" 
         class="absolute top-[-10%] left-[-5%] w-[400px] opacity-50 animate-bubble">

    <img src="gambar/bubble.png" 
         class="absolute top-[40%] right-[-10%] w-[300px] opacity-40 animate-bubble animation-delay-2000">

    <img src="gambar/bubble.png" 
         class="absolute bottom-[-10%] left-[10%] w-[350px] opacity-30 animate-bubble animation-delay-4000">
         
    <img src="gambar/bubble.png" class="absolute w-[600px] opacity-70 animate-bubble">
        
    </div>

    <a href="index.html" class="absolute top-6 left-6 md:top-10 md:left-10 flex items-center gap-3 text-gray-500 hover:text-[#8477e4] transition-all z-50 group">
        <div class="w-10 h-10 bg-white/40 backdrop-blur-md rounded-full flex items-center justify-center border border-white/60 shadow-sm group-hover:shadow-md group-hover:scale-105 transition-all">
            <i class="fas fa-arrow-left"></i>
        </div>
        <span class="font-medium text-sm hidden sm:block">Back to Home</span>
    </a>

    <div class="flex flex-col md:flex-row w-full max-w-[1000px] bg-white/30 backdrop-blur-xl border border-white/50 rounded-[30px] overflow-hidden shadow-[0_8px_32px_0_rgba(31,38,135,0.15)] relative z-10">

        <div class="hidden md:flex flex-col w-[45%] bg-gradient-to-br from-[#b59cfc]/80 via-[#dcb0f9]/80 to-[#f4c4f3]/80 p-10 relative">
            <div class="mb-10 flex justify-center">
                <img src="gambar/logo.png" alt="FinTrack AI Logo" class="h-20 w-auto object-contain">
            </div>
            <div class="z-10">
                <h1 class="text-3xl lg:text-4xl font-bold text-white mb-4 leading-tight">
                    Welcome Back!
                </h1>
                <p class="text-white/90 text-sm lg:text-base leading-relaxed max-w-[90%]">
                    Lanjutkan perjalanan finansialmu. Pantau, analisis, dan raih target keuanganmu bersama AI.
                </p>
            </div>
            <div class="mt-auto flex justify-center pt-8">
                <img src="gambar/gambarregis.png" alt="3D Illustration" class="w-[90%] object-contain">
            </div>
        </div>

        <div class="w-full md:w-[55%] p-10 lg:p-14 flex flex-col justify-center bg-white/40">
            
            <h2 class="text-2xl font-bold text-gray-900 mb-10">Sign In to FinTrack</h2>

            <form id="loginForm" class="space-y-8">
                
                <div>
                    <input type="email" id="emailInput" placeholder="Email Address" class="input-underline" required>
                </div>

                <div>
                    <div class="relative">
                        <input type="password" id="passwordInput" placeholder="Password" class="input-underline pr-10" required>
                        <button type="button" id="togglePassword" class="absolute right-0 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none">
                            <i class="far fa-eye-slash" id="eyeIcon"></i>
                        </button>
                    </div>
                    <div class="flex justify-end mt-3">
                        <a href="#" class="text-xs text-[#8477e4] hover:underline font-bold">Forgot Password?</a>
                    </div>
                </div>

                <div class="flex items-center gap-3 pt-2">
                    <input type="checkbox" id="remember" class="custom-checkbox">
                    <label for="remember" class="text-xs text-gray-500 font-medium cursor-pointer">
                        Remember me for 30 days
                    </label>
                </div>

                <button type="submit" class="w-full py-3.5 bg-gradient-to-r from-[#b59cfc] to-[#e584ee] hover:opacity-90 text-white text-lg font-bold rounded-full transition-all shadow-lg mt-4">
                    Sign In
                </button>
            </form>

            <div class="flex items-center my-8">
                <div class="flex-grow border-t border-gray-300"></div>
                <span class="px-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Or Sign In With</span>
                <div class="flex-grow border-t border-gray-300"></div>
            </div>

            <div class="flex justify-center mb-8">
                <button class="w-12 h-12 rounded-full border border-gray-200 shadow-sm flex items-center justify-center hover:shadow-md hover:bg-gray-50 transition-all bg-white/60">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" class="w-5 h-5">
                </button>
            </div>

            <p class="text-center text-xs text-gray-500 font-medium">
                Don't have an account? 
                <a href="register.html" class="text-[#8477e4] font-bold hover:underline">Sign Up</a>
            </p>
            
        </div>
    </div>

    <script>
        // Logika Show/Hide Password
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('passwordInput');
        const eyeIcon = document.getElementById('eyeIcon');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);

            if (type === 'password') {
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        });

        // Logika Redirect ke Halaman Utama (Landing Page) setelah Login
        const loginForm = document.getElementById('loginForm');

        loginForm.addEventListener('submit', function(event) {
            event.preventDefault(); 
            alert("Login berhasil! Selamat datang kembali di FinTrack AI.");
            window.location.href = "index.html"; 
        });
    </script>
</body>
</html>
